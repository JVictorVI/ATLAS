<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'none';
      img-src {{cspSource}} https:;
      style-src {{cspSource}};
      script-src {{cspSource}};
    "
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{{styleUri}}" />
    <title>Chaves de API</title>
  </head>

  <body>
    <h1>Chaves de API</h1>
    <div class="subtitle">
      Gerencie as credenciais utilizadas para integração com serviços externos
      de IA
    </div>

    <div class="card">
      <div class="section-title">Lista de Provedores Configurados</div>

      <div id="empty-credentials-state" class="empty-state">
        Nenhuma chave cadastrada ainda.
      </div>

      <table id="providers-table">
        <thead>
          <tr>
            <th>Provedor</th>
            <th>Chave Secreta</th>
            <th>Adicionado em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="providers-tbody"></tbody>
      </table>

      <div class="row-end">
        <button id="add-key-btn" class="btn-primary">Adicionar chave</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Configurações de Execução</div>

      <div class="checkbox-group">
        <div>
          <label class="checkBoxSection">
            <input type="checkbox" id="confirmCloud" />
            Confirmar antes de enviar código para nuvem
          </label>
        </div>

        <label class="checkBoxSection">
          <input type="checkbox" id="blockRag" />
          Bloquear envio automático de contexto RAG
        </label>

        <label class="checkBoxSection">
          <input type="checkbox" id="limitPayload" checked />
          Limitar tamanho máximo de payload (tokens)
        </label>
      </div>

      <div class="inline-fields">
        <div class="field">
          <label for="maxTokens">Máximo de tokens por requisição</label>
          <input id="maxTokens" type="number" value="4096" />
        </div>

        <div class="field">
          <label for="timeout">Timeout máximo da requisição (segundos)</label>
          <input id="timeout" type="number" value="30" />
        </div>
      </div>

      <div class="row-end">
        <button id="save-security-btn" class="btn-primary">Salvar</button>
      </div>
    </div>

    <script src="{{markedUri}}"></script>
    <script src="{{scriptUri}}"></script>
  </body>
</html>
